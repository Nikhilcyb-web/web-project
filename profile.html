<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8"/>
        <meta name="viewport"
        content="width=device-width,initial-scale=1"/>
        <title>Profile card</title>
        <link rel="stylesheet" href="profile.css">

    </head>
    <body>
        <main class="page">
            <article class="card">
                <div class="avatar-wrap">
                    <img src="avatar.jpg" alt="profile-photo"
                    class="avatar">
                </div>
                <div class="content">
                    <h1 class="name">Nikhil</h1>
                    <p class="role">Frontend dev.</p>
                    <p class="bio">build all web project,love clean ui</p>
                    <div class="social">
                        <a href="#" aria-label="github">GH</a>
                        <a href="#" area-label="linkedin">IN</a>
                        <a href="#" area-label="twitter">TW</a>
                    </div>
                </div>
            </article>
        </main>
    </body>

</html>
