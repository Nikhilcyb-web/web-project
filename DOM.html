<!DOCTYPE html>
<html>
  <style>
     
    .js-instagram{
      background-color:blue;
      color: white;
      padding-top: 3px;
      padding-left: 70px;
      padding-right: 70px;
      padding-bottom: 3px;
      border-width: 1.5px ;
      border-radius:1px;
      cursor: pointer;
      transition: all 0.01s ease;
      border-radius: 5px;
      border: none;
    }
  
     .js-instagram.activate {
      background-color: rgb(116, 113, 113);
      color: white;
      font-weight: bold;
    }
    .text{
      color: beige;
      font-family: Arial, Helvetica, sans-serif;
    }
  
  </style>
  <head>
    <title>INSTAGRAM FOLLOW BUTTON</title>
  </head>
  <body bgcolor="black">
    <p class="text">INSTAGRAM FOLLOW BUTTON</p>
    <button onclick="
      if (this.innerHTML === 'FOLLOW') {
        this.innerHTML = 'FOLLOWING';
        this.classList.add('activate');
      } else {
        this.innerHTML = 'FOLLOW';
        this.classList.remove('activate');
      }" class="js-instagram">FOLLOW</button>

      <script>
        function toggle(btn) {
          btn.classList.toggle("activate");
        }

      </script>
  
  </body>

</html>
